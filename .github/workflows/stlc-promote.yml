name: Promote SDKs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  promote:
    if: github.repository == 'CaseMark/casedev-cli-staging'
    runs-on: ubuntu-latest
    env:
      PRODUCTION_REPO: CaseMark/casedev-cli
      GH_TOKEN: ${{ secrets.PRODUCTION_REPO_TOKEN }}
    steps:
      - name: Check out staging
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate production token
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Missing PRODUCTION_REPO_TOKEN."
            exit 1
          fi

      - name: Fetch production main
        run: |
          git remote add production "https://x-access-token:${GH_TOKEN}@github.com/${PRODUCTION_REPO}.git"
          git fetch production main

      - name: Check if production is already in sync
        id: diff
        run: |
          STAGING_SHA=$(git rev-parse origin/main)
          PRODUCTION_SHA=$(git rev-parse production/main)
          if [ "$STAGING_SHA" = "$PRODUCTION_SHA" ]; then
            echo "Production is already at $STAGING_SHA. Nothing to release."
            echo "synced=true" >> "$GITHUB_OUTPUT"
          else
            echo "synced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push staging main to production release branch
        if: steps.diff.outputs.synced == 'false'
        run: git push production origin/main:refs/heads/stainless/release --force

      - name: Open or update production release PR
        if: steps.diff.outputs.synced == 'false'
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "$PRODUCTION_REPO" \
            --head stainless/release \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --repo "$PRODUCTION_REPO" \
              --base main \
              --head stainless/release \
              --title "Release SDK updates" \
              --body "$(git log --oneline production/main..origin/main)"
          else
            echo "Release PR #$EXISTING_PR already exists. Force-push has updated it."
          fi
