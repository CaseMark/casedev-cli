---
name: Publish Release
permissions:
  contents: write

concurrency:
  group: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}
jobs:
  goreleaser:
    runs-on: ubuntu-latest
    env:
      GONOSUMDB: github.com/CaseMark/*
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: "go.mod"
    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6.1.0
      with:
        version: latest
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
        MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
        MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
        MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
        MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

  notify-casedotdev-mono:
    name: Trigger casedotdev-mono snapshot rebuild
    needs: goreleaser
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch casedev-cli-released event
        env:
          GH_TOKEN: ${{ secrets.CASEDOTDEV_MONO_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::CASEDOTDEV_MONO_DISPATCH_TOKEN is not set — skipping mono snapshot-rebuild dispatch"
            exit 0
          fi

          echo "Dispatching casedev-cli-released to CaseMark/casedotdev-mono for tag $TAG"
          gh api repos/CaseMark/casedotdev-mono/dispatches \
            -f "event_type=casedev-cli-released" \
            -f "client_payload[tag]=$TAG"
