name: CI
on:
  push:
    branches:
      - '**'
      - '!integrated/**'
      - '!stl-preview-head/**'
      - '!stl-preview-base/**'
      - '!generated'
      - '!codegen/**'
      - 'codegen/stl/**'
  pull_request:
    branches-ignore:
      - 'stl-preview-head/**'
      - 'stl-preview-base/**'

env:
  GOPRIVATE: github.com/CaseMark/casedev-go,github.com/CaseMark/casedev-go-staging

jobs:
  lint:
    timeout-minutes: 10
    name: lint
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork) && (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    env:
      GONOSUMDB: github.com/CaseMark/*

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate git for the private Go SDK repo
        shell: bash
        env:
          GO_MODULE_REPO: ${{ github.repository == 'CaseMark/casedev-cli-staging' && 'CaseMark/casedev-go-staging' || 'CaseMark/casedev-go' }}
          GO_REPO_READ_TOKEN: ${{ secrets.GO_REPO_READ_TOKEN }}
        run: |
          if [ -z "$GO_REPO_READ_TOKEN" ]; then
            echo "::error::Missing GO_REPO_READ_TOKEN secret for ${GO_MODULE_REPO}."
            exit 1
          fi

          git config --global url."https://x-access-token:${GO_REPO_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: ./.github/actions/setup-go

      - name: Link staging branch
        if: github.repository == 'CaseMark/casedev-cli-staging'
        env:
          GO_BRANCH: ${{ github.ref_name }}
          GO_MODULE_REPO: CaseMark/casedev-go-staging
        run: |
          ./scripts/link "github.com/${GO_MODULE_REPO}@${GO_BRANCH}"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run lints
        run: ./scripts/lint

  build:
    timeout-minutes: 10
    name: build
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event.pull_request.head.repo.fork) && (github.event_name != 'push' || github.event.head_commit.message != 'codegen metadata')
    env:
      GONOSUMDB: github.com/CaseMark/*
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate git for the private Go SDK repo
        shell: bash
        env:
          GO_MODULE_REPO: ${{ github.repository == 'CaseMark/casedev-cli-staging' && 'CaseMark/casedev-go-staging' || 'CaseMark/casedev-go' }}
          GO_REPO_READ_TOKEN: ${{ secrets.GO_REPO_READ_TOKEN }}
        run: |
          if [ -z "$GO_REPO_READ_TOKEN" ]; then
            echo "::error::Missing GO_REPO_READ_TOKEN secret for ${GO_MODULE_REPO}."
            exit 1
          fi

          git config --global url."https://x-access-token:${GO_REPO_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: ./.github/actions/setup-go

      - name: Link staging branch
        if: github.repository == 'CaseMark/casedev-cli-staging'
        env:
          GO_BRANCH: ${{ github.ref_name }}
          GO_MODULE_REPO: CaseMark/casedev-go-staging
        run: |
          ./scripts/link "github.com/${GO_MODULE_REPO}@${GO_BRANCH}"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: latest
          args: release --snapshot --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}





  test:
    timeout-minutes: 10
    name: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork
    env:
      GONOSUMDB: github.com/CaseMark/*
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Authenticate git for the private Go SDK repo
        shell: bash
        env:
          GO_MODULE_REPO: ${{ github.repository == 'CaseMark/casedev-cli-staging' && 'CaseMark/casedev-go-staging' || 'CaseMark/casedev-go' }}
          GO_REPO_READ_TOKEN: ${{ secrets.GO_REPO_READ_TOKEN }}
        run: |
          if [ -z "$GO_REPO_READ_TOKEN" ]; then
            echo "::error::Missing GO_REPO_READ_TOKEN secret for ${GO_MODULE_REPO}."
            exit 1
          fi

          git config --global url."https://x-access-token:${GO_REPO_READ_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: ./.github/actions/setup-go

      - name: Link staging branch
        if: github.repository == 'CaseMark/casedev-cli-staging'
        env:
          GO_BRANCH: ${{ github.ref_name }}
          GO_MODULE_REPO: CaseMark/casedev-go-staging
        run: |
          ./scripts/link "github.com/${GO_MODULE_REPO}@${GO_BRANCH}"

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Run tests
        run: ./scripts/test
