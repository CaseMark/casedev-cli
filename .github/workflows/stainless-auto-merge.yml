name: Auto-merge Stainless PRs

on:
  pull_request:
    types: [opened, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check actor permission
        id: actor
        run: |
          if [ "$ACTOR" = "stainless-app[bot]" ]; then
            echo "can_merge=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          permission="$(gh api "repos/${GITHUB_REPOSITORY}/collaborators/${ACTOR}/permission" --jq '.permission' 2>/dev/null || true)"
          if [ "$permission" = "admin" ]; then
            echo "can_merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_merge=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.actor.outputs.can_merge == 'true'
        run: gh pr merge "${{ github.event.pull_request.number }}" --auto --merge --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
